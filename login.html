<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AutoServiceHoute</title>
  <link rel="stylesheet" href="./src/css/base.css">
  <link rel="stylesheet" href="./src/css/pages/login.css">
  <link rel="stylesheet" href="./src/css/navbar.css">
</head>
<body class="login-body">
  
  <div class="login-split-container">
    <div class="login-left">
      <div class="login-content">
        <div class="login-logo">
          
       <a href="${base}" class="logo-link">
      <div class="logo-text">
        <div class="logo-line1">Autoservice</div>
        <div class="logo-line2">Houte</div>
      </div>
    </a>
        </div>


        <form class="login-form" id="login-form">
          <div class="input-group">
            <label for="username" class="input-label">Username</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input 
                type="text" 
                id="username" 
                placeholder="Enter your username"
                autocomplete="username"
                required
              >
            </div>
          </div>

          <div class="input-group">
            <label for="password" class="input-label">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input 
                type="password" 
                id="password" 
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              >
              <button type="button" class="eye-toggle" id="toggle-password">
                <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="error-message" id="error-message"></div>

          <button type="submit" class="login-button">Log in</button>
        </form>
      </div>
    </div>

    <div class="login-right">
      <img src="./images/bmw-2.jpeg" alt="Auto Service" class="login-bg-image">
    </div>
  </div>

  <script type="module" src="./src/js/auth.js"></script>
</body>
</html>
